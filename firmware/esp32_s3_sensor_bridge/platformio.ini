; PlatformIO 项目配置文件 —— ESP32-S3 传感器桥接固件。
;
; 开发环境：esp32-s3-devkitc-1 开发板，Arduino 框架。
; 监视器波特率 115200，烧录波特率 921600。
;
; 烧录命令：
;   pio run -t upload
;
; 串口监视：
;   pio device monitor -b 115200

[platformio]
; 源代码目录设为 src/，PlatformIO 默认扫描此目录编译。
src_dir = src

[env:esp32-s3-devkitc-1]
; 平台：Espressif ESP32 系列
platform = espressif32
; 开发板型号：ESP32-S3-DevKitC-1
board = esp32-s3-devkitc-1
; 使用 Arduino 框架（方便快速开发，后期可迁移到 ESP-IDF）
framework = arduino
; 串口监视器波特率（与固件 Serial.begin 一致）
monitor_speed = 115200
; 烧录波特率（高速烧录，需 USB 线缆支持）
upload_speed = 921600